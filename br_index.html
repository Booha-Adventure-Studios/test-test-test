<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Boo-riculum Study Decks</title>
<meta name="theme-color" content="#0a1a0f">
<link rel="icon" type="image/png" href="../../boo-tree.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<style>
:root {
  --green-deep:    #0a1a0f;
  --green-mid:     #14331c;
  --green-bright:  #2e7d4f;
  --green-light:   #4db87a;
  --blue-deep:     #0d1f35;
  --blue-mid:      #1a3a5c;
  --blue-bright:   #2e6ea6;
  --blue-light:    #5ba3d9;
  --gold-dark:     #7a5c1e;
  --gold-mid:      #c49a2a;
  --gold-bright:   #e8c555;
  --gold-light:    #f5dfa0;
  --ink:           #f0ead8;
  --ink-dim:       #b8b09a;

  --tile-w:        170px;
  --tile-h:        170px;
  --tile-r:        28px;
  --tile-border:   3px;

  --font-display:  'Playfair Display', Georgia, serif;
  --font-body:     'IM Fell English', Georgia, serif;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html, body {
  height: 100%;
  font-family: var(--font-display);
  background: var(--green-deep);
  color: var(--ink);
  overflow: hidden;
}

/* ── Background canvas ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Scroll container ── */
#app {
  position: relative;
  z-index: 1;
  height: 100dvh;
  max-height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

/* ── Main layout ── */
#welcome {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 36px 20px 28px;
  gap: 10px;
  animation: fadeUp 1.4s cubic-bezier(.22,.8,.36,1) both;
}

/* ── Icon ── */
.boo-icon {
  width: clamp(64px, 14vw, 96px);
  height: auto;
  filter:
    drop-shadow(0 0 18px rgba(232,197,85,.55))
    drop-shadow(0 0 6px rgba(232,197,85,.3));
  animation: floatIcon 5s ease-in-out infinite;
}

@keyframes floatIcon {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-8px); }
}

/* ── Headings ── */
.title-en {
  font-size: clamp(28px, 5.5vw, 58px);
  font-weight: 900;
  letter-spacing: .5px;
  line-height: 1.05;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-bright) 50%, var(--gold-mid) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  margin-top: 14px;
}

.title-jp {
  font-size: clamp(14px, 2.6vw, 22px);
  font-weight: 700;
  color: var(--green-light);
  letter-spacing: 2px;
  margin-top: 2px;
}

/* Decorative rule */
.rule {
  width: clamp(120px, 40vw, 280px);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
  margin: 10px auto 4px;
  position: relative;
}
.rule::before, .rule::after {
  content: '✦';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--gold-bright);
  line-height: 1;
}
.rule::before { left: -14px; }
.rule::after  { right: -14px; }

.subtitle {
  font-family: var(--font-body);
  font-style: italic;
  font-size: clamp(13px, 2.2vw, 18px);
  color: var(--ink-dim);
  letter-spacing: .5px;
  margin-bottom: 8px;
}

/* ── Tiles grid ── */
.deck-links {
  display: flex;
  gap: 1.1rem;
  flex-wrap: wrap;
  justify-content: center;
  padding: 16px 4px 10px;
  position: relative;
}

/* ── Single tile ── */
a.deck {
  width: var(--tile-w);
  height: var(--tile-h);
  border-radius: var(--tile-r);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  color: var(--ink);
  font-weight: 900;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  touch-action: pan-y manipulation;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1);
  transform: translateZ(0);
  z-index: 1;
}

/* Jewel glow ring (idle) */
a.deck::before {
  content: "";
  position: absolute;
  inset: -6px;
  border-radius: calc(var(--tile-r) + 6px);
  background: conic-gradient(
    from var(--angle, 0deg),
    var(--t-accent-a) 0%,
    var(--t-accent-b) 25%,
    var(--t-accent-a) 50%,
    var(--t-accent-b) 75%,
    var(--t-accent-a) 100%
  );
  opacity: .45;
  z-index: -1;
  filter: blur(2px);
  animation: spinRing 6s linear infinite;
  pointer-events: none;
}

/* Bloom halo (active) */
a.deck::after {
  content: "";
  position: absolute;
  inset: -40px;
  border-radius: 50%;
  z-index: -2;
  pointer-events: none;
  opacity: 0;
  transform: scale(.7) translateZ(0);
  transition: opacity .3s ease, transform .3s ease;
  background: radial-gradient(circle, var(--t-halo) 0%, transparent 72%);
}

/* Tile surface */
a.deck .clip {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  overflow: hidden;
  z-index: 2;
  border: var(--tile-border) solid var(--t-border);
  box-shadow:
    0 12px 32px rgba(0,0,0,.6),
    0 0 0 1px rgba(255,255,255,.08) inset,
    0 1px 0 rgba(255,255,255,.15) inset;
}

/* Tile inner fill */
a.deck .inner {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 12px;
  gap: 6px;
  background: var(--t-bg);
  text-align: center;
  line-height: 1.1;
  transition: filter .2s;
}

/* Animated shimmer overlay */
a.deck .inner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    115deg,
    transparent 30%,
    rgba(255,255,255,.08) 50%,
    transparent 70%
  );
  background-size: 200% 200%;
  background-position: 150% 0%;
  border-radius: inherit;
  pointer-events: none;
  transition: background-position .4s ease;
}
a.deck:hover .inner::after {
  background-position: -50% 100%;
}

/* Text labels */
a.deck .label {
  display: block;
  width: 100%;
  font-size: clamp(14px, 1.6vw, 17px);
  letter-spacing: .3px;
  text-wrap: balance;
  overflow-wrap: anywhere;
  color: var(--ink);
  text-shadow: 0 1px 6px rgba(0,0,0,.6);
}
a.deck .jp {
  display: block;
  width: 100%;
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 700;
  opacity: .8;
  color: var(--t-jp);
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
}

/* Tile icon (emoji / character) */
a.deck .tile-icon {
  font-size: clamp(26px, 4vw, 36px);
  line-height: 1;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
}

/* Sparkles container */
a.deck .sparkles {
  position: absolute;
  inset: 0;
  z-index: 9;
  pointer-events: none;
  border-radius: inherit;
  overflow: hidden;
}
.mote {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: moteFly var(--dur,.8s) ease-out forwards;
  background: radial-gradient(circle, var(--mote-color, #f5dfa0) 0%, transparent 70%);
}
@keyframes moteFly {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(.4); }
  20%  { opacity:1; transform:translate(-50%,-50%) scale(1.1); }
  100% { opacity:0; transform:translate(var(--tx,0px), var(--ty,-40px)) scale(.6); }
}

/* ── Per-tile color tokens ── */

/* Vocabulary — Emerald green */
a.deck:nth-child(1) {
  --t-bg:      linear-gradient(145deg, #1b4d30 0%, #0f2d1c 60%, #153d26 100%);
  --t-border:  var(--green-light);
  --t-accent-a: var(--green-light);
  --t-accent-b: var(--gold-bright);
  --t-halo:    rgba(77,184,122,.5);
  --t-jp:      var(--green-light);
  --mote-color: #a0f0c0;
}

/* Sentences — Sapphire blue */
a.deck:nth-child(2) {
  --t-bg:      linear-gradient(145deg, #1a3a5c 0%, #0d1f35 60%, #152d4a 100%);
  --t-border:  var(--blue-light);
  --t-accent-a: var(--blue-light);
  --t-accent-b: var(--gold-bright);
  --t-halo:    rgba(91,163,217,.5);
  --t-jp:      var(--blue-light);
  --mote-color: #a0d8f0;
}

/* Questions — Antique gold */
a.deck:nth-child(3) {
  --t-bg:      linear-gradient(145deg, #3d2e0a 0%, #221900 60%, #2e2208 100%);
  --t-border:  var(--gold-bright);
  --t-accent-a: var(--gold-bright);
  --t-accent-b: var(--green-light);
  --t-halo:    rgba(232,197,85,.5);
  --t-jp:      var(--gold-light);
  --mote-color: #ffe090;
}

/* Stream — Deep teal (blue-green blend) */
a.deck:nth-child(4) {
  --t-bg:      linear-gradient(145deg, #0e3030 0%, #071a1a 60%, #0d2828 100%);
  --t-border:  #5dd4c4;
  --t-accent-a: #5dd4c4;
  --t-accent-b: var(--gold-bright);
  --t-halo:    rgba(93,212,196,.5);
  --t-jp:      #8de8dc;
  --mote-color: #b0f5ee;
}

/* ── Hover ── */
a.deck:hover {
  transform: scale(1.06) translateY(-3px);
  z-index: 10;
}
a.deck:hover::before {
  opacity: .75;
}

/* ── Playing state (bloom) ── */
a.deck.playing {
  transform: scale(1.1) translateY(-4px);
  z-index: 999;
  animation: bloom .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
a.deck.playing::after {
  opacity: 1;
  transform: scale(1.15) translateZ(0);
}
a.deck.playing .inner {
  animation: pulseInner 1.2s ease-in-out infinite;
}
a.deck.playing::before {
  opacity: 1;
  animation: spinRing 1.2s linear infinite;
}

@keyframes bloom {
  0%   { transform: scale(1);    }
  60%  { transform: scale(1.13) translateY(-5px); }
  100% { transform: scale(1.1)  translateY(-4px); }
}

@keyframes pulseInner {
  0%,100% { filter: brightness(1);   }
  50%     { filter: brightness(1.25) saturate(1.2); }
}

@keyframes spinRing {
  to { --angle: 360deg; }
}

/* ── Tap state ── */
a.deck.tap {
  transform: scale(.93);
  transition: transform .1s ease;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Stagger tile entrances */
.deck-links a.deck {
  animation: tileIn .7s cubic-bezier(.22,.8,.36,1) both;
}
.deck-links a.deck:nth-child(1) { animation-delay: .25s; }
.deck-links a.deck:nth-child(2) { animation-delay: .38s; }
.deck-links a.deck:nth-child(3) { animation-delay: .51s; }
.deck-links a.deck:nth-child(4) { animation-delay: .64s; }

@keyframes tileIn {
  from { opacity:0; transform:translateY(24px) scale(.9); }
  to   { opacity:1; transform:translateY(0)   scale(1);   }
}

/* ── Footer ── */
footer {
  margin-top: 14px;
  padding: 10px 0 24px;
  font-family: var(--font-body);
  font-style: italic;
  font-size: clamp(12px, 1.8vw, 15px);
  color: var(--ink-dim);
  letter-spacing: 1.5px;
  opacity: .7;
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  .boo-icon, a.deck, a.deck::before { animation: none !important; }
  a.deck.playing .inner            { animation: none !important; }
  .mote                            { animation: none !important; opacity:0; }
}

/* ── Portrait phone ── */
@media (max-width: 430px) {
  :root {
    --tile-w: 148px;
    --tile-h: 148px;
    --tile-r: 24px;
  }
}

/* ── Landscape phone: two-column grid ── */
@media (orientation: landscape) and (max-height: 520px) {
  #welcome { padding: 20px 16px 16px; gap: 6px; }
  .boo-icon { width: 48px; }
  .title-en { font-size: clamp(22px, 4.5vw, 36px); margin-top: 8px; }
  .title-jp { font-size: clamp(12px, 2vw, 16px); }
  .rule     { margin: 6px auto 2px; }
  .subtitle { font-size: clamp(11px, 1.8vw, 14px); margin-bottom: 4px; }
  .deck-links {
    display: grid;
    grid-template-columns: repeat(4, var(--tile-w));
    gap: .9rem;
    padding: 10px 4px 6px;
  }
  :root { --tile-w: 128px; --tile-h: 128px; }
}

/* CSS custom property trick for conic-gradient animation */
@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
</style>
</head>

<body>
<div id="app">

<!-- Background canvas: floating forest particles -->
<canvas id="bg-canvas" aria-hidden="true"></canvas>



<audio id="clickBgm" preload="auto">
  <source src="studydeck.mp3" type="audio/mpeg">
</audio>

<section id="welcome">

  <img class="boo-icon" src="../../boo-tree.png" alt="Boo-tree" onerror="this.style.display='none'">

  <h1 class="title-en">Boo-riculum<br>Study Decks</h1>
  <p class="title-jp">ブーリキュラム・スタディデッキ</p>

  <div class="rule" aria-hidden="true"></div>

  <p class="subtitle">July Week 1 · 7月第1週</p>

  <div class="deck-links">

    <a class="deck" href="br_vocab.html">
      <div class="clip">
        <div class="inner">
          <span class="tile-icon" aria-hidden="true">📖</span>
          <span class="label">Vocabulary</span>
          <span class="jp">語彙</span>
        </div>
        <div class="sparkles" aria-hidden="true"></div>
      </div>
    </a>

    <a class="deck" href="br_sentences.html">
      <div class="clip">
        <div class="inner">
          <span class="tile-icon" aria-hidden="true">✍️</span>
          <span class="label">Sentences</span>
          <span class="jp">文</span>
        </div>
        <div class="sparkles" aria-hidden="true"></div>
      </div>
    </a>

    <a class="deck" href="br_questions.html">
      <div class="clip">
        <div class="inner">
          <span class="tile-icon" aria-hidden="true">❓</span>
          <span class="label">Questions</span>
          <span class="jp">質問</span>
        </div>
        <div class="sparkles" aria-hidden="true"></div>
      </div>
    </a>

    <a class="deck" href="br_stream.html">
      <div class="clip">
        <div class="inner">
          <span class="tile-icon" aria-hidden="true">🎙️</span>
          <span class="label">Stream</span>
          <span class="jp">ストリーム</span>
        </div>
        <div class="sparkles" aria-hidden="true"></div>
      </div>
    </a>

  </div>

  <footer>Bryan's English School</footer>
</section>

<!-- ── Background particle forest ── -->
<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  const COLORS = ['#2e7d4f','#4db87a','#2e6ea6','#5ba3d9','#e8c555','#c49a2a','#5dd4c4'];
  const PARTS  = [];
  const COUNT  = 55;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < COUNT; i++) {
    PARTS.push({
      x:    Math.random() * window.innerWidth,
      y:    Math.random() * window.innerHeight,
      r:    1 + Math.random() * 2.2,
      vx:   (Math.random() - .5) * .25,
      vy:   -.08 - Math.random() * .2,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: .1 + Math.random() * .3,
      life:  Math.random(),
    });
  }

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of PARTS) {
      p.x += p.vx;
      p.y += p.vy;
      p.life += .004;
      if (p.y < -10 || p.life > 1) {
        p.x    = Math.random() * canvas.width;
        p.y    = canvas.height + 10;
        p.life = 0;
        p.vx   = (Math.random() - .5) * .25;
        p.vy   = -.08 - Math.random() * .2;
        p.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        p.alpha = .1 + Math.random() * .3;
      }
      const a = p.alpha * Math.sin(p.life * Math.PI);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

<!-- ── Interaction ── -->
<script>
const clickBgm  = document.getElementById('clickBgm');
let   lockedUI  = false;

function stopBgm() {
  try { clickBgm.pause(); clickBgm.currentTime = 0; } catch {}
}

/* Floating motes burst from tile */
function burstMotes(anchor) {
  const box = anchor.querySelector('.sparkles');
  if (!box) return;
  box.innerHTML = '';

  const n = 14;
  for (let i = 0; i < n; i++) {
    const m = document.createElement('div');
    m.className = 'mote';

    const size = 6 + Math.random() * 8;
    const x    = 15 + Math.random() * 70;
    const y    = 15 + Math.random() * 70;
    const tx   = (Math.random() - .5) * 60 + 'px';
    const ty   = -(20 + Math.random() * 50) + 'px';
    const dur  = (.5 + Math.random() * .5) + 's';

    m.style.cssText = `
      width:${size}px; height:${size}px;
      left:${x}%; top:${y}%;
      --tx:${tx}; --ty:${ty}; --dur:${dur};
      animation-delay:${(Math.random() * .12)}s;
    `;
    box.appendChild(m);
  }

  setTimeout(() => { box.innerHTML = ''; }, 1200);
}

async function playThenGo(anchor) {
  if (lockedUI) return;
  lockedUI = true;

  const url = anchor.getAttribute('href');

  /* Tap flash */
  anchor.classList.add('tap');
  setTimeout(() => anchor.classList.remove('tap'), 120);

  /* Lock others */
  document.querySelectorAll('a.deck').forEach(el => {
    if (el !== anchor) el.style.pointerEvents = 'none';
  });

  stopBgm();

  /* Bloom the tile */
  anchor.classList.add('playing');
  burstMotes(anchor);

  let navigated = false;
  const go = () => {
    if (navigated) return;
    navigated = true;
    window.location.href = url;
  };

  clickBgm.onended = go;
  const hardFallback = setTimeout(go, 900);

  try {
    clickBgm.volume      = 0.95;
    clickBgm.currentTime = 0;
    await clickBgm.play();
    clearTimeout(hardFallback);
    setTimeout(go, 5200);
  } catch (e) {
    go();
  }
}

document.querySelectorAll('a.deck').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    playThenGo(a);
  }, { passive: false });
});
</script>

</div>
</body>
